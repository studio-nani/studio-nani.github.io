<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 흐름</title>
  <meta name="theme-color" content="#f6f1ea">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1ea;
      --surface: rgba(255, 252, 247, 0.88);
      --text: #26272f;
      --muted: #70707c;
      --line: rgba(38, 39, 47, 0.12);
      --primary: #40536b;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "SUIT", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(98, 120, 149, 0.12), transparent 32%),
        radial-gradient(circle at bottom right, rgba(196, 170, 129, 0.14), transparent 28%),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(100%, 480px);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 32px;
      padding: 28px 24px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    a {
      display: inline-flex;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 18px;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>나의 흐름</h1>
    <p>사주 기반 개인 리포트 앱의 웹 연결 페이지입니다. 계정 연결 또는 앱 복귀 테스트는 아래 경로를 사용하세요.</p>
    <a href="/my-flow/auth-bridge.html">계정 연결 브리지 열기</a>
  </main>
</body>
</html>
