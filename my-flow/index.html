<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>나의 흐름 | Studio Nani</title>
    <meta name="description" content="나의 흐름 설치 및 제품 안내 페이지입니다." />
    <meta name="theme-color" content="#f6f3ee" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;800&family=SUIT:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=light-hub-1" />
  </head>
  <body data-page="product" data-product="myFlow">
    <main class="page">
      <section class="hero product-hero reveal" aria-labelledby="product-title">
        <div class="hero-top">
          <div class="brand-lockup">
            <div class="logo-wrap">
              <img id="product-icon" src="/assets/my-flow.png" alt="" class="logo" />
            </div>
            <div class="hero-copy">
              <p class="eyebrow" id="product-kicker">Today, Aligned</p>
              <h1 id="product-title">나의 흐름</h1>
              <p class="subtitle" id="product-description">
                내 사주를 저장하고 오늘, 특정 날짜, 이번주와 앞으로의 흐름을 조용한 리포트로 확인하세요.
              </p>
            </div>
          </div>
          <div class="language-switch" aria-label="Language switcher">
            <button type="button" class="lang-btn" data-lang="en">EN</button>
            <button type="button" class="lang-btn" data-lang="ko">KO</button>
            <button type="button" class="lang-btn" data-lang="ja">JA</button>
          </div>
        </div>
      </section>

      <section class="panel reveal" aria-labelledby="install-title">
        <div class="section-head">
          <p class="section-kicker" data-i18n="product.installKicker">Install</p>
          <h2 id="install-title" data-i18n="product.installTitle">스토어에서 설치</h2>
          <p data-i18n="product.installDescription">사용 중인 기기의 스토어로 이동하세요.</p>
        </div>
        <div id="product-actions" class="product-actions"></div>
      </section>

      <section class="panel reveal" aria-labelledby="details-title">
        <div class="section-head compact">
          <p class="section-kicker" data-i18n="product.detailsKicker">Details</p>
          <h2 id="details-title" data-i18n="product.detailsTitle">제품 메모</h2>
        </div>
        <ul id="product-features" class="feature-list"></ul>
      </section>

      <section class="panel reveal" aria-labelledby="legal-title">
        <div class="section-head compact">
          <p class="section-kicker" data-i18n="product.legalKicker">Documents</p>
          <h2 id="legal-title" data-i18n="product.legalTitle">앱 운영 문서</h2>
        </div>
        <div id="legal-links" class="link-list"></div>
      </section>

      <footer class="footer reveal">
        <p><a href="/" data-propagate-source>Studio Nani</a></p>
      </footer>
    </main>

    <script src="/script.js?v=light-hub-1"></script>
  </body>
</html>
